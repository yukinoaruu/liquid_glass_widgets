name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Analyze + Test + Coverage (all platforms, stable + beta)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }} / Flutter ${{ matrix.flutter-channel }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # see all failures, not just the first
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        flutter-channel: [stable, beta]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal warnings)
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        shell: bash
        run: |
          # Golden tests (test/golden/) are pixel-accurate comparisons generated on a
          # specific local macOS renderer — they always fail on CI runners which use a
          # different OS version / font stack. Run them locally only.
          #
          # Renderer tests (test/renderer/) require a live GPU rasterizer and cannot
          # execute in a headless VM. Excluded everywhere in CI.
          TEST_FILES=$(find test -name '*_test.dart' \
            ! -path '*/golden/*' \
            ! -path '*/renderer/*' \
            | sort | tr '\n' ' ')
          flutter test --coverage $TEST_FILES

      # Coverage threshold guard — fail if effective coverage drops below 90 %.
      #
      # Raw Codecov shows ~82 % because it includes lib/src/renderer/* — 16 files
      # that contain GPU CustomPainter / RenderObject code that cannot execute in a
      # headless VM (no GPU rasterizer). Those paths are documented as untestable in
      # ARCHITECTURE.md. We strip them before computing the threshold AND before
      # uploading to Codecov so the badge always reflects effective coverage (~92 %).
      #
      # lcov is available on ubuntu (apt) and macos (pre-installed via brew).
      - name: Check coverage threshold (≥ 90 % effective)
        if: matrix.os != 'windows-latest' && matrix.flutter-channel == 'stable'
        shell: bash
        run: |
          # Install lcov (no longer pre-installed on macOS or ubuntu runners).
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get install -y lcov --quiet
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install lcov --quiet
          fi

          # Strip GPU renderer paths that are physically untestable in a headless VM.
          lcov --remove coverage/lcov.info \
            'lib/src/renderer/*' \
            --ignore-errors unused \
            -o coverage/lcov_effective.info

          TOTAL=$(lcov --summary coverage/lcov_effective.info 2>&1 \
            | grep 'lines' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Effective line coverage (renderer excluded): ${TOTAL}%"

          if (( $(echo "$TOTAL < 90.0" | bc -l) )); then
            echo "❌  Effective coverage ${TOTAL}% is below the 90% threshold."
            exit 1
          fi
          echo "✅  Effective coverage ${TOTAL}% passes the 90% threshold."

      # Upload effective (renderer-excluded) coverage to Codecov.
      # Runs after the filter step so the badge reflects the same ~92% that the
      # threshold gate measures — not the raw ~82% that included untestable GPU paths.
      # Only uploaded once (stable macOS) to avoid duplicate reports.
      - name: Upload coverage to Codecov
        if: matrix.os == 'macos-latest' && matrix.flutter-channel == 'stable'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov_effective.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Shader validation (SkSL / glslang)
  # glslangValidator is cross-platform — it rejects the same invalid SPIR-V
  # constructs (dynamic array indices, non-constant loop bounds) regardless of
  # host OS. Running on Ubuntu where apt install is instant and reliable.
  # ─────────────────────────────────────────────────────────────────────────
  shader-validation:
    name: Shader Validation (SkSL / glslang)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install glslang
        run: sudo apt-get install -y glslang-tools

      - name: Verify glslangValidator
        run: glslangValidator --version

      - name: Validate shaders
        run: bash scripts/validate_shaders.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: pub.dev publish dry-run
  # Catches: missing dartdoc, pubspec issues, platform declaration gaps,
  # files accidentally included/excluded, score regressions.
  # Runs on stable macOS only — one run is enough.
  # ─────────────────────────────────────────────────────────────────────────
  pub-check:
    name: pub.dev Publish Dry-Run
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Publish dry-run
        run: dart pub publish --dry-run
